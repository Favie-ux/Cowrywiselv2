<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="./style3.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="globalLoadingScreen">
        <img src="./gif-logo-loading.gif" alt="Loading...">
    </div>
<div class="container">
<div class="image">
    <img src="./img/cowrywise.png" alt="">
</div>
<div class="auth-main d-flex container row-gap-2">
    <div class="auth-intro">
         <h3 class="jump">Jump right in</h3>
        <h5 class="sign">Sign in to continue</h5><br>
        <div class="auth-header-row">
        <div class="new">New user?</div><a class="create-account-link" href="./signup.html">Create account</a></div>
    </div>
    <div class="auth-panel">
        <form class="form1">
          <div class="signin">
                <div class="google">
                 <button class="google-btn" type="button" onclick="googleAuth()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
                  Sign in with Google
                 </button>
                </div>
                <div class="apple">
                    <button class="google-btn" type="button" onclick="appleAuth()">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo" style="width: 20px; height: 20px;">
                     Sign in with Apple
                </button>
                 </div>
            </div >
            <div class="separator">or</div>
            <div class="signup-fields">
                <div>
                    <input class="email" type="text" placeholder="Email address" id="signinEmail" oninput="validateEmail(this)" style="width: 100%;">
                    <div id="emailError" style="display: none; color: #dc3545; font-size: 13px; margin-top: 5px;">Please enter a valid email address (e.g., name@example.com).</div>
                </div>
                <div class="password-row" style="margin-top: 15px; align-items: flex-start;">
                    <div style="flex: 1;">
                        <input class="password" type="password" placeholder="Password" id="signinPassword" oninput="validatePassword(this)" style="width: 100%;">
                        <div id="passwordError" style="display: none; color: #dc3545; font-size: 13px; margin-top: 5px;">Password must be 8+ chars with uppercase, lowercase, number, and special character.</div>
                    </div>
                    <a href="" style="margin-left: 10px; margin-top: 15px;">Forgot password?</a>
                </div>
             </div><br>
             <button id="btn" type="submit" class="submit-button btn-primary">Sign in</button>
        </form>
      </div>    
</div>
 <div class="auth-footer-info">
            <p>
              Trouble signing in? <a href="#">Chat with us</a>
            </p>
     <P class="auth-legal-links">
        <a href="#">Privacy</a>
        <span> | </span>
        <a href="#">Terms</a>
    </P>
    </div>
  
 

    <button class="support-button" aria-label="Chat support">◎</button>
</div>
<script type="module" src="signin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

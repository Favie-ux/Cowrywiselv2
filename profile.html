<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Cowrywise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <div id="globalLoadingScreen">
        <img src="./gif-logo-loading.gif" alt="Loading...">
    </div>

    <nav class="top-navbar">
        <div class="logo">
            <img src="./img/imgi_2_dashboard-logo.svg" alt="Cowrywise Logo" style="height: 32px; width: auto;">
        </div>
        <div class="page-title">MY PROFILE</div>
        <a href="dashboard.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
    </nav>

    <div class="profile-page">

        <div class="profile-card">
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <img src="" alt="Profile Photo" id="profilePhoto" class="profile-photo" style="display:none;">
                    <div class="avatar-placeholder" id="avatarPlaceholder">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <label for="photoInput" class="change-photo-btn">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="changePhoto(this)">
                </div>
                <h2 id="profileFullName">Loading...</h2>
                <p id="profileEmailDisplay">loading@email.com</p>
            </div>

            <div class="profile-info-grid">
                <div class="info-item">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" placeholder="First Name">
                </div>
                <div class="info-item">
                    <label>Last Name</label>
                    <input type="text" id="editLastName" placeholder="Last Name">
                </div>
                <div class="info-item full-width">
                    <label>Email Address</label>
                    <input type="email" id="editEmail" readonly>
                </div>
                <div class="info-item">
                    <label>Sex</label>
                    <select id="editSex">
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="info-item">
                    <label>Location</label>
                    <input type="text" id="editLocation" placeholder="City, Country">
                </div>
                <div class="info-item full-width">
                    <label>Halal Account</label>
                    <div class="halal-status" id="halalStatus">No</div>
                </div>
            </div>

            <button class="save-profile-btn" onclick="saveProfile()">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
        </div>

    </div>

    <div id="toastMsg" class="toast-msg" style="display:none;"></div>

    <script src="profile.js"></script>
</body>
</html>
